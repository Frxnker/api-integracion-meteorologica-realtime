<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta del Tiempo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-content">
        <p class="eyebrow">Información meteorológica en tiempo real</p>
        <h1>Consulta del Tiempo</h1>
        <p>Obtén temperatura, humedad, presión y pronóstico para tu ciudad con un diseño moderno y animado.</p>
      </div>
      <div class="hero-decor"></div>
    </header>

    <main class="container">
      <section class="panel">
        <div class="panel-header">
          <h2>Buscar ciudad</h2>
          <p>Escribe el nombre de la ciudad y selecciona el tipo de consulta.</p>
        </div>

        <div class="form-group">
          <label for="city">Ciudad</label>
          <input type="text" id="city" placeholder="Ej. Madrid, Barcelona, Sevilla">
        </div>

        <div class="form-group actions">
          <button id="currentWeatherBtn">Tiempo Actual</button>
          <button id="forecastWeatherBtn">Pronóstico 5 días</button>
        </div>

        <div id="notification" class="notification hidden"></div>
      </section>

      <section id="result" class="result-panel"></section>
    </main>
  </div>


</body>
</html>
